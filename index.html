<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pragati Kumari — MERN Stack Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── THEME TOKENS (visual-only; no content changes) ── */
      :root {
        --bg:       #07080b;
        --bg2:      #0b0d12;
        --bg3:      #101420;
        --surface:  rgba(255,255,255,0.05);
        --surface2: rgba(255,255,255,0.03);
        --border:   rgba(255,255,255,0.1);
        --border2:  rgba(255,255,255,0.2);

        --text:     #ffffff;
        --text2:    #a1a1aa;
        --text3:    #52525b;

        /* Accent system */
        --accent:   #e9eefc;
        --accent2:  #a9b7ff;
        --accent3:  #60a5fa;

        --grad1: linear-gradient(135deg, rgba(169,183,255,0.24), rgba(96,165,250,0.10));
        --grad2: linear-gradient(135deg, #0b0d12, #101420);
        --grad3: linear-gradient(135deg, #07080b, #0b0d12);
        --shadow:  0 4px 24px rgba(0,0,0,0.4);
        --shadow2: 0 0 30px rgba(96,165,250,0.08);
        --glow:    0 0 18px rgba(169,183,255,0.20);
        --glow2:   0 0 36px rgba(96,165,250,0.12);

        --radius:  16px;
        --radius2: 24px;
      }

      /* ── LIGHT THEME ── */
      [data-theme="light"] {
        --bg:       #ffffff;
        --bg2:      #f7f8fb;
        --bg3:      #eff2f8;
        --surface:  rgba(0,0,0,0.03);
        --surface2: rgba(0,0,0,0.02);
        --border:   rgba(0,0,0,0.1);
        --border2:  rgba(0,0,0,0.2);

        --text:     #0b0d12;
        --text2:    #3f3f46;
        --text3:    #71717a;

        --accent:   #0b0d12;
        --accent2:  #2b3cff;
        --accent3:  #0ea5e9;

        --grad1: linear-gradient(135deg, rgba(43,60,255,0.14), rgba(14,165,233,0.08));
        --grad2: linear-gradient(135deg, #f7f8fb, #eff2f8);
        --grad3: linear-gradient(135deg, #ffffff, #f7f8fb);
        --shadow:  0 4px 24px rgba(0,0,0,0.06);
        --shadow2: 0 0 30px rgba(43,60,255,0.10);
        --glow:    0 0 18px rgba(43,60,255,0.12);
        --glow2:   0 0 36px rgba(14,165,233,0.12);
      }

      html {
        font-size: 16px;
        background: var(--bg);
        background-image:
          radial-gradient(900px 500px at 15% 0%, rgba(169,183,255,0.12), transparent 60%),
          radial-gradient(800px 520px at 90% 10%, rgba(96,165,250,0.10), transparent 60%),
          radial-gradient(700px 520px at 60% 120%, rgba(169,183,255,0.06), transparent 60%);
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: transparent;
        color: var(--text);
        overflow-x: hidden;
        transition: color 0.5s ease, background 0.5s ease;
        line-height: 1.6;
      }

      /* Cursor & motion accessibility */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
      }

      :focus-visible {
        outline: 2px solid rgba(96,165,250,0.55);
        outline-offset: 3px;
        border-radius: 10px;
      }

      /* ── CUSTOM CURSOR ── */
      #cursor-dot {
        position: fixed; top: 0; left: 0; z-index: 99999; pointer-events: none;
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--text);
        transform: translate(-50%,-50%);
        transition: width 0.15s, height 0.15s;
      }
      #cursor-ring {
        position: fixed; top: 0; left: 0; z-index: 99998; pointer-events: none;
        width: 28px; height: 28px; border-radius: 50%;
        border: 1px solid rgba(169,183,255,0.35);
        transform: translate(-50%,-50%);
        transition: transform 0.18s ease, width 0.2s, height 0.2s, opacity 0.2s;
        opacity: 0.5;
      }
      [data-theme="light"] #cursor-ring { border-color: rgba(43,60,255,0.22); }
      body:has(a:hover) #cursor-dot,
      body:has(button:hover) #cursor-dot { width: 10px; height: 10px; }
      body:has(a:hover) #cursor-ring,
      body:has(button:hover) #cursor-ring { width: 44px; height: 44px; opacity: 0.25; }

      @media (hover: none), (pointer: coarse) {
        #cursor-dot, #cursor-ring { display: none !important; }
      }

      /* ── CURSOR TRAILING AFTERIMAGES ── */
      .cursor-ghost {
        position: fixed;
        top: 0;
        left: 0;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        pointer-events: none;
        z-index: 99997;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle at 30% 30%, rgba(233,238,252,0.55), rgba(96,165,250,0.0) 62%);
        border: 1px solid rgba(169,183,255,0.16);
        box-shadow: 0 0 18px rgba(96,165,250,0.14);
        opacity: 0.0;
        mix-blend-mode: screen;
        filter: saturate(1.05);
      }
      [data-theme="light"] .cursor-ghost {
        background: radial-gradient(circle at 30% 30%, rgba(43,60,255,0.22), rgba(14,165,233,0.0) 62%);
        border-color: rgba(43,60,255,0.12);
        box-shadow: 0 0 18px rgba(43,60,255,0.10);
        mix-blend-mode: multiply;
      }
      @media (hover: none), (pointer: coarse), (prefers-reduced-motion: reduce) {
        .cursor-ghost { display: none !important; }
      }

      /* ── SCROLL PROGRESS BAR ── */
      #scroll-bar {
        position: fixed; top: 0; left: 0; height: 3px; z-index: 9999;
        background: var(--grad1);
        box-shadow: var(--glow);
        transition: width 0.1s linear;
        pointer-events: none;
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg2); }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
      [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
      ::selection { background: rgba(255,255,255,0.15); color: var(--text); }
      [data-theme="light"] ::selection { background: rgba(0,0,0,0.1); }
      input::placeholder, textarea::placeholder { color: var(--text3); opacity: 0.7; }

      /* ── TYPOGRAPHY ── */
      .serif { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.5px; }
      .mono  { font-family: 'JetBrains Mono', monospace; }

      h1, h2, h3 { color: var(--text); font-family: 'Space Grotesk', sans-serif; }

      /* ── SHIMMER ── */
      .shimmer-text {
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 45%, var(--accent) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 4s linear infinite;
      }
      [data-theme="light"] .shimmer-text {
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 45%, var(--accent) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      @keyframes shimmer {
        0%   { background-position: 0% center; }
        100% { background-position: 200% center; }
      }

      /* ── GLASS ── */
      .glass {
        background: var(--surface);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
      }

      /* ── CARD ── */
      .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        transition: box-shadow 0.3s, border-color 0.3s, transform 0.3s;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: '';
        position: absolute; inset: 0; border-radius: 16px;
        background: transparent;
        pointer-events: none;
      }
      .card:hover {
        box-shadow: 0 0 34px rgba(96,165,250,0.12);
        border-color: var(--border2);
        transform: translateY(-4px);
      }
      [data-theme="light"] .card:hover {
        box-shadow: 0 0 34px rgba(43,60,255,0.10);
      }

      /* ── BUTTONS ── */
      .btn-primary {
        background: linear-gradient(135deg, rgba(169,183,255,0.95), rgba(96,165,250,0.88));
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 50px;
        padding: 12px 28px; color: rgba(10,12,18,0.98); font-weight: 700; font-size: 0.88rem;
        font-family: 'JetBrains Mono', monospace;
        transition: all 0.25s; letter-spacing: 0.5px;
        position: relative; overflow: hidden;
      }
      .btn-primary:hover { transform: translateY(-2px); filter: saturate(1.05); box-shadow: var(--glow2); }
      [data-theme="light"] .btn-primary { border-color: rgba(0,0,0,0.08); }

      .btn-outline {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 50px; padding: 11px 28px; color: var(--text);
        font-weight: 600; font-size: 0.88rem;
        font-family: 'JetBrains Mono', monospace; transition: all 0.25s;
        letter-spacing: 0.5px;
      }
      .btn-outline:hover { background: rgba(169,183,255,0.08); border-color: rgba(169,183,255,0.22); transform: translateY(-2px); }

      /* ── SECTION TAG ── */
      .section-tag {
        display: inline-flex; align-items: center; gap: 8px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 50px; padding: 6px 16px;
        font-size: 0.72rem; font-weight: 500; color: var(--text2);
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 1px; text-transform: uppercase;
      }

      /* ── DIVIDER ── */
      .section-divider {
        width: 100%; height: 1px;
        background: linear-gradient(90deg, transparent, var(--border2), transparent);
        margin: 0;
      }

      /* ── ANIMATIONS ── */
      @keyframes float {
        0%,100% { transform: translateY(0); }
        50%      { transform: translateY(-14px); }
      }
      @keyframes pulse-ring {
        0%   { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(1.6); opacity: 0; }
      }
      @keyframes scanline {
        0%   { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      /* ── RESPONSIVE HELPERS ── */
      @media (max-width: 768px) {
        html { font-size: 15px; }
        .hide-mobile { display: none !important; }
        .grid-2  { grid-template-columns: 1fr !important; }
        .grid-4  { grid-template-columns: repeat(2,1fr) !important; }
        .grid-3  { grid-template-columns: 1fr !important; }
      }

      /* ── HOME SECTION RESPONSIVE ── */
      .home-grid {
        max-width: 1240px;
        margin: 0 auto;
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: clamp(32px, 5vw, 64px);
        align-items: center;
        padding: clamp(48px, 8vw, 80px) clamp(20px, 5vw, 48px) clamp(48px, 6vw, 80px);
        position: relative;
        z-index: 1;
        box-sizing: border-box;
      }
      .home-left { min-width: 0; }
      .home-right {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .home-card {
        width: 100%;
        max-width: 320px;
        border-radius: 32px;
      }
      .home-stats {
        border-top: 1px solid var(--border);
        background: var(--surface);
        backdrop-filter: blur(20px);
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
      }
      .home-stat-item {
        flex: 1 1 100px;
        text-align: center;
        padding: 20px 12px;
        border-right: 1px solid var(--border);
      }
      .home-stat-item:last-child { border-right: none; }

      @media (max-width: 900px) {
        .home-grid {
          grid-template-columns: 1fr;
          padding: clamp(32px, 6vw, 56px) clamp(16px, 5vw, 32px) 48px;
          gap: 40px;
        }
        .home-right { display: none; }
      }
      @media (max-width: 480px) {
        .home-stat-item { flex: 1 1 50%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px 8px; }
        .home-stat-item:nth-child(odd) { border-right: 1px solid var(--border); }
        .home-stat-item:last-child, .home-stat-item:nth-last-child(2):nth-child(odd) { border-bottom: none; }
      }

      /* ── SECTION SPACING ── */
      section { scroll-margin-top: 68px; }

      /* ── FACTS TICKER RESPONSIVE ── */
      .facts-ticker {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 50px;
        padding: 10px 20px;
        max-width: 100%;
        backdrop-filter: blur(12px);
        overflow: hidden;
      }

      /* ── BUTTON ROW ── */
      .btn-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 36px;
      }
      @media (max-width: 400px) {
        .btn-row { flex-direction: column; }
        .btn-row .btn-primary, .btn-row .btn-outline { width: 100%; text-align: center; justify-content: center; }
      }

      /* ── CARD HOVER DISABLE ON TOUCH ── */
      @media (hover: none) {
        .card:hover { transform: none; box-shadow: var(--shadow); }
      }
    </style>
  </head>
  <body>
    <!-- Custom cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <!-- Scroll progress -->
    <div id="scroll-bar" style="width:0%"></div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Custom cursor
      const dot  = document.getElementById('cursor-dot');
      const ring = document.getElementById('cursor-ring');
      let mx = 0, my = 0, rx = 0, ry = 0;
      document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
      (function loop() {
        rx += (mx - rx) * 0.18;
        ry += (my - ry) * 0.18;
        dot.style.left  = mx + 'px';
        dot.style.top   = my + 'px';
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(loop);
      })();

      // Cursor trailing afterimages (theme-matched)
      (function cursorGhosts() {
        try {
          const reduce = document.documentElement.getAttribute('data-reduced-motion') === '1';
          const coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
          if (reduce || coarse) return;

          const N = 10;
          const ghosts = Array.from({ length: N }, () => {
            const el = document.createElement('div');
            el.className = 'cursor-ghost';
            document.body.appendChild(el);
            return { el, x: mx, y: my };
          });

          const speeds = ghosts.map((_, i) => 0.18 - i * 0.012); // slower tail
          let gx = mx, gy = my;

          (function step() {
            gx += (mx - gx) * 0.22;
            gy += (my - gy) * 0.22;
            let px = gx, py = gy;
            for (let i = 0; i < ghosts.length; i++) {
              const g = ghosts[i];
              const s = Math.max(0.04, speeds[i]);
              g.x += (px - g.x) * s;
              g.y += (py - g.y) * s;
              px = g.x;
              py = g.y;
              g.el.style.left = g.x + 'px';
              g.el.style.top = g.y + 'px';
              g.el.style.opacity = String(0.30 - i * 0.022);
              const size = 16 - i * 0.7;
              g.el.style.width = size + 'px';
              g.el.style.height = size + 'px';
            }
            requestAnimationFrame(step);
          })();
        } catch {}
      })();

      // Magnetic buttons
      document.addEventListener('mousemove', e => {
        document.querySelectorAll('.btn-primary, .btn-outline').forEach(btn => {
          const rect = btn.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = e.clientX - cx, dy = e.clientY - cy;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 90) {
            const pull = (90 - dist) / 90;
            btn.style.transform = `translate(${dx * pull * 0.38}px, ${dy * pull * 0.38}px)`;
          } else {
            btn.style.transform = '';
          }
        });
      });

      // Typing sound (subtle click on keydown in inputs)
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const playClick = () => {
        if (document.documentElement.getAttribute('data-reduced-motion') === '1') return;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 600 + Math.random() * 200;
        o.type = 'sine';
        g.gain.setValueAtTime(0.04, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
        o.start(); o.stop(ctx.currentTime + 0.06);
      };
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') playClick();
      });

      // Scroll progress bar
      const bar = document.getElementById('scroll-bar');
      window.addEventListener('scroll', () => {
        const pct = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
        bar.style.width = pct + '%';
      });

      // Reduced motion marker (helps other effects opt-out cleanly)
      try {
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduce) document.documentElement.setAttribute('data-reduced-motion', '1');
      } catch {}
    </script>
  </body>
</html>
